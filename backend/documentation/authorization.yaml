register:
  tags:
    - Authorization
  summary: "Register a new user"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            firstname: {type: string, example: "Jozef"}
            surname: {type: string, example: "Novy"}
            username: {type: string, example: "jozkoplet"}
            password: {type: string, example: "jozef1234"}
            email: {type: string, example: "jozo1@gmail.com"}
            birthdate: {type: string, example: "1999-06-19"}
  responses:
    200:
      description: "User successfully registered"
      content:
        application/json:
          schema:
            type: object
            properties:
              "message": {type: string, example: "Success"}
              "token": {type: string, example: "eyJhbG..."}
    400:
      description: "Invalid request format or data"
      content:
        application/json:
          schema:
            type: object
            properties:
              "message": {type: string}
          examples:
            invalid_format:
              value: {message: "Invalid register format!"}
            birthdate_future:
              value: {message: "Date of birth cannot be from the future!"}
    409:
      description: "Conflict - User, Username or Email already exists"
      content:
        application/json:
          schema:
            type: object
            properties:
              "message": {type: string}
          examples:
            username_taken:
              value: {message: "Username already taken"}
            email_used:
              value: {message: "This email was already used!"}
            user_exists:
              value: {message: "User already exists!"}

login:
  tags:
    - Authorization
  summary: "User login"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            username: {type: string, example: "jozkoplet"}
            password: {type: string, example: "jozef1234"}
  responses:
    200:
      description: "Login successful"
      content:
        application/json:
          schema:
            type: object
            properties:
              "message": {type: string, example: "Success"}
              "token": {type: string, example: "eyJhbG..."}
    400:
      description: "Invalid request format"
      content:
        application/json:
          schema:
            type: object
            properties:
              "message": {type: string, example: "Invalid login format!"}
    401:
      description: "Unauthorized - Invalid username or password"
      content:
        application/json:
          schema:
            type: object
            properties:
              "message": {type: string, example: "Invalid credentials!"}