create_conversation:
  tags:
    - Conversations
  summary: "Create a new conversation with participants"
  security:
    - Bearer: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              example: "Projektova skupina"
            participant_ids:
              type: array
              items:
                type: integer
              example: [2, 3, 4]
              description: "List of user IDs to add to the conversation (current user is added automatically)"
  responses:
    200:
      description: "Conversation created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Conversation created successfully"}
              conversation_id: {type: integer, example: 10}
    400:
      description: "Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Invalid format!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to create conversation!"}

get_conversations:
  tags:
    - Conversations
  summary: "Retrieve all conversations for the current user"
  security:
    - Bearer: []
  responses:
    200:
      description: "List of conversations retrieved successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              conversations:
                type: array
                items:
                  type: object
                  properties:
                    id: {type: integer, example: 1}
                    name: {type: string, example: "Test Conversation"}
                    created_at: {type: string, example: "2023-10-27T10:00:00"}


get_conversation:
  tags:
    - Conversations
  summary: "Get a specific conversation by ID"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: conv_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Conversation found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              conversation:
                type: object
                properties:
                  id: {type: integer, example: 1}
                  name: {type: string, example: "Nova Konverzacia"}
                  created_at: {type: string, example: "2023-10-27T10:00:00"}
                  type: {type: string, example: "group"}
    403:
      description: "Not a participant"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You are not a participant of this conversation!"}
    404:
      description: "Conversation not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Conversation not found!"}

delete_conversation:
  tags:
    - Conversations
  summary: "Delete a conversation"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: conv_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Conversation deleted successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Conversation deleted successfully"}
    403:
      description: "Not a participant"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You are not a participant of this conversation!"}
    500:
