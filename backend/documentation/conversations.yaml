get_files:
  tags:
    - Conversations
  summary: "Retrieve all files for a specific message"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: message_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "List of files retrieved successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              files:
                type: array
                items:
                  type: object
                  properties:
                    id: {type: integer, example: 1}
                    message_id: {type: integer, example: 1}
                    name: {type: string, example: "document"}
                    extension: {type: string, example: "pdf"}
    403:
      description: "No access to message"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You don't have access to this message!"}

upload_file:
  tags:
    - Conversations
  summary: "Upload a file for a specific message"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: message_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            content:
              type: string
              format: binary
              description: "The file to upload"
  responses:
    200:
      description: "File uploaded successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "File uploaded successfully"}
              file_id: {type: integer, example: 1}
              name: {type: string, example: "document"}
              extension: {type: string, example: "pdf"}
    400:
      description: "Invalid format or empty file"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "File is empty!"}
    403:
      description: "Not your message"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You can only attach files to your own messages!"}
    404:
      description: "Message not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Message not found!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to upload file!"}

download_file:
  tags:
    - Conversations
  summary: "Download a specific file"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: file_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "File downloaded successfully"
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    403:
      description: "No access"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You don't have access to this file!"}
    404:
      description: "File not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "File not found!"}

delete_file:
  tags:
    - Conversations
  summary: "Delete a specific file"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: file_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "File deleted successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "File deleted successfully"}
    403:
      description: "No access or permission"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You don't have permission to delete this file!"}
    404:
      description: "File not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "File not found!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to delete file!"}