      description: "Message sent successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Message sent successfully"}
              message_id: {type: integer, example: 1}
    400:
      description: "Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Invalid format!"}
    403:
      description: "Not a participant"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You are not a participant of this conversation!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to send message!"}

