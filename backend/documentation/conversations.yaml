      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to delete conversation!"}

get_participants:
  tags:
    - Conversations
  summary: "Retrieve all participants of a specific conversation"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: conv_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "List of participants retrieved successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              participants:
                type: array
