create_group:
  tags:
    - Groups
  summary: "Create a new group"
  security:
    - Bearer: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
          properties:
            name: {type: string, example: "Moja Skupina"}
  responses:
    201:
      description: "Group created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
              group_id: {type: integer}
              conversation_id: {type: integer}
          example:
            message: "Group created successfully"
            group_id: 12
            conversation_id: 101
    400:
      description: "Bad Request - Missing group name"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Group name is required!"
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "error"

get_groups:
  tags:
    - Groups
  summary: "Retrieve all groups for the current user"
  security:
    - Bearer: []
  responses:
    200:
      description: "List of groups retrieved successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
              groups:
                type: array
                items:
                  type: object
                  properties:
                    id_group: {type: integer}
                    name: {type: string}
                    create_date: {type: string}
                    has_icon: {type: boolean}
          example:
            message: "Success"
            groups:
              - id_group: 1
                name: "Moja Skupina"
                create_date: "2023-10-27T10:00:00"
                has_icon: true

get_group:
  tags:
    - Groups
  summary: "Get a specific group by ID"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Group found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
              group:
                type: object
                properties:
                  id_group: {type: integer}
                  name: {type: string}
                  create_date: {type: string}
                  has_icon: {type: boolean}
                  conversation_id: {type: integer}
          example:
            message: "Success"
            group:
              id_group: 12
              name: "Moja Skupina"
              create_date: "2023-10-27T10:00:00"
              has_icon: true
              conversation_id: 101
    403:
      description: "Forbidden - Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "You are not a member of this group!"
    404:
      description: "Group not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Group not found!"

update_group:
  tags:
    - Groups
  summary: "Update group details"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name: {type: string, example: "Nova Skupina"}
  responses:
    200:
      description: "Group updated successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Group updated successfully"
    400:
      description: "Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Invalid format!"
    403:
      description: "Forbidden - No permission or Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            not_member:
              value: {message: "You are not a member of this group!"}
            no_permission:
              value: {message: "You don't have permission to manage this group!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Failed to update group!"

delete_group:
  tags:
    - Groups
  summary: "Delete a group"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Group deleted successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Group deleted successfully"
    403:
      description: "Forbidden - No permission or Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            not_member:
              value: {message: "You are not a member of this group!"}
            no_permission:
              value: {message: "You don't have permission to delete this group!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Failed to delete group!"

get_group_members:
  tags:
    - Groups
  summary: "Retrieve all members of a specific group"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "List of members retrieved successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
              members:
                type: array
                items:
                  type: object
                  properties:
                    id_registration: {type: integer}
                    username: {type: string}
                    email: {type: string}
                    name: {type: string}
                    surname: {type: string}
                    has_profile_picture: {type: boolean}
          example:
            message: "Success"
            members:
              - id_registration: 1
                username: "jozkoplet"
                email: "jozo1@gmail.com"
                name: "Jozef"
                surname: "Novy"
                has_profile_picture: true
    403:
      description: "Forbidden - Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "You are not a member of this group!"

add_group_member:
  tags:
    - Groups
  summary: "Add a new member to a group"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - username
          properties:
            username: {type: string, example: "novy_clen"}
  responses:
    200:
      description: "Member added successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Member added successfully"
    400:
      description: "Invalid format or Duplicate member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            invalid_format:
              value: {message: "Invalid format!"}
            already_member:
              value: {message: "User is already a member of this group!"}
    403:
      description: "No permission or Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            not_member:
              value: {message: "You are not a member of this group!"}
            no_permission:
              value: {message: "You don't have permission to add users!"}
    404:
      description: "User not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "User not found!"
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Failed to add member!"

remove_group_member:
  tags:
    - Groups
  summary: "Remove a member from a group"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
    - in: path
      name: user_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Member removed successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Member removed successfully"
    403:
      description: "No permission or Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            not_member:
              value: {message: "You are not a member of this group!"}
            no_permission:
              value: {message: "You don't have permission to manage members!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Failed to remove member!"

get_group_icon:
  tags:
    - Groups
  summary: "Retrieve group icon"
  description: "Retrieves the group icon as a raw binary stream."
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Group icon streamed successfully"
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    403:
      description: "Forbidden - Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "You are not a member of this group!"
    404:
      description: "Group or icon not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "No icon found for this group"

update_group_icon:
  tags:
    - Groups
  summary: "Update group icon"
  description: "Uploads a new group icon. Supports ONLY JPEG and PNG formats."
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
            - image
          properties:
            image:
              type: string
              format: binary
  responses:
    200:
      description: "Group icon updated"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Group icon uploaded successfully"
    400:
      description: "Image file missing or invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            no_file:
              value: {message: "No image file provided!"}
            invalid_format:
              value: {message: "Invalid format! Only JPEG and PNG are supported."}
    403:
      description: "No permission or Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            not_member:
              value: {message: "You are not a member of this group!"}
            no_permission:
              value: {message: "You don't have permission to manage this group!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Failed to upload group icon!"

delete_group_icon:
  tags:
    - Groups
  summary: "Remove group icon"
  description: "Deletes the current group's icon. This is the preferred way to reset the icon."
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Group icon removed"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Group icon removed successfully"
    403:
      description: "No permission or Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          examples:
            not_member:
              value: {message: "You are not a member of this group!"}
            no_permission:
              value: {message: "You don't have permission to manage this group!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string}
          example:
            message: "Failed to remove group icon!"