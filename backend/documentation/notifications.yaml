get_notifications:
  tags:
    - Notifications
  summary: "Get all notifications for the current user"
  security:
    - Bearer: []
  responses:
    200:
      description: "Success"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              notifications:
                type: array
                items:
                  type: object
                  properties:
                    id_notification: {type: integer, example: 12}
                    type: {type: string, example: "new_message"}
                    created_at: {type: string, format: "date-time", example: "2026-04-09T10:55:00Z"}

create_notification:
  tags:
    - Notifications
  summary: "Create a new notification"
  security:
    - Bearer: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - type
            - user_ids
          properties:
            type: {type: string, example: "activity_invite"}
            user_ids:
              type: array
              items: {type: integer}
              example: [1, 2, 5]
            message_id: {type: integer, example: 42}
            activity_id: {type: integer, example: 7}
  responses:
    201:
      description: "Notification created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Notification created successfully"}
              notification_id: {type: integer, example: 15}
    400:
      description: "Bad Request - Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Invalid format!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to create notification!"}

delete_notification:
  tags:
    - Notifications
  summary: "Delete a specific notification for the current user"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: notif_id
      required: true
      schema:
        type: integer
      description: "ID of the notification to delete"
  responses:
    200:
      description: "Notification deleted successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Notification deleted successfully"}
    404:
      description: "Not Found - Notification does not exist or belong to user"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Notification not found!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to delete notification!"}