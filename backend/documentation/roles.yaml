get_roles:
  tags:
    - Roles
  summary: "Retrieve all roles for a specific group"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Success"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              roles:
                type: array
                items:
                  type: object
                  properties:
                    id_role: {type: integer, example: 5}
                    name: {type: string, example: "Moderator"}
                    color: {type: string, example: "#FF5733"}
    403:
      description: "Forbidden - Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You are not a member of this group!"}

create_role:
  tags:
    - Roles
  summary: "Create a new role"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - name
          properties:
            name: {type: string, example: "Admin"}
            color: {type: string, example: "#000000"}
            permissions:
              type: array
              items: {type: string}
              example: ["create_role", "edit_role"]
  responses:
    201:
      description: "Role created successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Role created successfully"}
              role_id: {type: integer, example: 10}
              assigned_permissions:
                type: array
                items: {type: string}
                example: ["create_role", "edit_role"]
    400:
      description: "Bad Request - Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Invalid format!"}
    403:
      description: "Forbidden - No permission"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You don't have permission to create role!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to create role!"}

update_role:
  tags:
    - Roles
  summary: "Update an existing role"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
    - in: path
      name: role_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name: {type: string, example: "Super Admin"}
            color: {type: string, example: "#FF0000"}
            permissions:
              type: array
              items: {type: string}
              example: ["create_role", "edit_role", "delete_role"]
  responses:
    200:
      description: "Role updated successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Role updated successfully"}
    400:
      description: "Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Invalid format!"}
    403:
      description: "Forbidden - No permission"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You don't have permission to manage roles!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to update role!"}

