get_roles:
  tags:
    - Roles
  summary: "Retrieve all roles for a specific group"
  parameters:
    - in: path
      name: group_id
      required: true
      type: integer
  security:
    - Bearer: []
  responses:
    200:
      description: "Success"
      schema:
        type: object
        properties:
          message: {type: string, example: "Success"}
          roles:
            type: array
            items:
              type: object
              properties:
                id_role: {type: integer, example: 5}
                name: {type: string, example: "Moderator"}
                color: {type: string, example: "#FF5733"}
    403:
      description: "Forbidden - Not a member"
      schema:
        type: object
        properties:
          message: {type: string, example: "You are not a member of this group!"}

create_role:
  tags:
    - Roles
  summary: "Create a new role"
  parameters:
    - in: path
      name: group_id
      required: true
      type: integer
    - in: body
      name: body
      schema:
        type: object
        required:
          - name
        properties:
          name: {type: string, example: "Admin"}
          color: {type: string, example: "#000000"}
          permissions:
            type: array
            items: {type: string}
            example: ["create_role", "edit_role"]
  security:
    - Bearer: []
  responses:
    201:
      description: "Role created successfully"
      schema:
        type: object
        properties:
          message: {type: string, example: "Role created successfully"}
          role_id: {type: integer, example: 10}
          assigned_permissions: {type: array, items: {type: string}}
    400:
      description: "Bad Request - Invalid format"
    403:
      description: "Forbidden - No permission"
    500:
      description: "Database error"

update_role:
  tags:
    - Roles
  summary: "Update an existing role"
  parameters:
    - in: path
      name: group_id
      required: true
      type: integer
    - in: path
      name: role_id
      required: true
      type: integer
    - in: body
      name: body
      schema:
        type: object
        properties:
          name: {type: string}
          color: {type: string}
          permissions: {type: array, items: {type: string}}
  security:
    - Bearer: []
  responses:
    200:
      description: "Role updated successfully"
    400:
      description: "Invalid format"
    403:
      description: "Forbidden"
    500:
      description: "Internal Server Error"

delete_role:
  tags:
    - Roles
  summary: "Delete a role"
  parameters:
    - in: path
      name: group_id
      required: true
      type: integer
    - in: path
      name: role_id
      required: true
      type: integer
  security:
    - Bearer: []
  responses:
    200:
      description: "Role deleted successfully"
    403:
      description: "Forbidden"
    500:
      description: "Failed to delete"

get_user_roles:
  tags:
    - Roles
  summary: "Get roles assigned to a user in a group"
  parameters:
    - in: path
      name: group_id
      required: true
      type: integer
    - in: path
      name: user_id
      required: true
      type: integer
  security:
    - Bearer: []
  responses:
    200:
      description: "Success"
      schema:
        type: object
        properties:
          message: {type: string, example: "Success"}
          roles: {type: array, items: {type: object}}

assign_user_role:
  tags:
    - Roles
  summary: "Assign a role to a user"
  parameters:
    - in: path
      name: group_id
      required: true
      type: integer
    - in: body
      name: body
      schema:
        type: object
        required:
          - username
          - role_id
        properties:
          username: {type: string}
          role_id: {type: integer}
  security:
    - Bearer: []
  responses:
    200:
      description: "Role assigned successfully"
    404:
      description: "User or Role not found"
    500:
      description: "Failed to assign"

remove_user_role:
  tags:
    - Roles
  summary: "Remove a role from a user"
  parameters:
    - in: path
      name: group_id
      required: true
      type: integer
    - in: path
      name: user_id
      required: true
      type: integer
    - in: path
      name: role_id
      required: true
      type: integer
  security:
    - Bearer: []
  responses:
    200:
      description: "Role removed successfully"
    403:
      description: "Forbidden"
    500:
      description: "Failed to remove"