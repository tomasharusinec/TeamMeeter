get_user_roles:
  tags:
    - Roles
  summary: "Get roles assigned to a user in a group"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
    - in: path
      name: user_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "Success"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              roles:
                type: array
                items:
                  type: object
                  properties:
                    id_role: {type: integer, example: 5}
                    name: {type: string, example: "Moderator"}
                    color: {type: string, example: "#FF5733"}
    403:
      description: "Forbidden - Not a member"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You are not a member of this group!"}

assign_user_role:
  tags:
    - Roles
  summary: "Assign a role to a user"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: group_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - username
            - role_id
          properties:
            username: {type: string, example: "jozkoplet"}
            role_id: {type: integer, example: 5}
  responses:
    200:
      description: "Role assigned successfully"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Role assigned successfully"}
    400:
      description: "Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Invalid format!"}
    403:
      description: "Forbidden - No permission"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You don't have permission to manage roles!"}
    404:
      description: "User or Role not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "User not found or is not a member of this group!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to assign role!"}

