get_user_by_id:
  tags:
    - Users
  summary: "Get a specific user by ID"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: user_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "User found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Success"}
              "user": {type: object, properties: { id_registration: {type: integer}, username: {type: string} }}
    404:
      description: "User not found"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "User not found!"}

update_user:
  tags:
    - Users
  summary: "Update user profile"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: user_id
      required: true
      schema:
        type: integer
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            name: {type: string, example: "Jozef"}
            surname: {type: string, example: "Vymeneny"}
            birthdate: {type: string, example: "1999-06-19"}
            profile_picture: {type: string, example: "nova_fotka.jpg"}
  responses:
    200:
      description: "Update successful"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "User updated successfully"}
    403:
      description: "Forbidden - trying to update another user"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You can only update your own profile!"}
    400:
      description: "Invalid format"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Invalid format!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to update user!"}

delete_user:
  tags:
    - Users
  summary: "Delete user account"
  security:
    - Bearer: []
  parameters:
    - in: path
      name: user_id
      required: true
      schema:
        type: integer
  responses:
    200:
      description: "User deleted"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "User deleted successfully"}
    403:
      description: "Forbidden - trying to delete another user"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "You can only delete your own account!"}
    500:
      description: "Database error"
      content:
        application/json:
          schema:
            type: object
            properties:
              message: {type: string, example: "Failed to delete user!"}